apiVersion: apps/v1 #Specifies the Kubernetes API version

kind: Deployment #Defines the the type of Kubernetes resource
metadata:
  name: ticketing-app #name of deployment
  namespace: eventhub
spec: #spec of deployment
  replicas: 1 #amount of replicas
  selector: #defines which app to use
    matchLabels:
      app: ticketing_app #defines the labelselector used by the deployer to identify and manage this deployment
  template:
    metadata:
      labels:
        app: ticketing_app # Applies the label to the pods created by this Deployment.
    spec: #defines the pods
      containers: # a pod and its configurations
        - name: ticketing-backend #name
          image: ticketing-service:latest #image
          imagePullPolicy: Never
          ports:
            - containerPort: 8080 #port
          envFrom:
            - configMapRef:
                name: service-ports


---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-service
  namespace: eventhub
spec:
  selector:
    app: ticketing_app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080