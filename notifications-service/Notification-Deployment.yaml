apiVersion: apps/v1 #Specifies the Kubernetes API version

kind: Deployment #Defines the the type of Kubernetes resource
metadata:
  name: notification-app #name of deployment
  namespace: eventhub
spec: #spec of deployment
  replicas: 3 #amount of replicas
  selector: #defines which app to use
    matchLabels:
      app: notification-app #defines the labelselector used by the deployer to identify and manage this deployment
  template:
    metadata:
      labels:
        app: notification-app # Applies the label to the pods created by this Deployment.
    spec: #defines the pods
      containers: # a pod and its configurations
        - name: notification-backend #name
          image: notifications-service:latest #image
          imagePullPolicy: Never
          ports:
            - containerPort: 8080 #port
          envFrom:
            - configMapRef:
                name: service-ports


