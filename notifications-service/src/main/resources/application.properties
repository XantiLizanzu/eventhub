spring.application.name=notifications-service
server.port=${NOTIFICATIONS_SERVICE_PORT:8082}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:notificationdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Set the context path for the entire app
server.servlet.context-path=/notifications

# Explicitly set the OpenAPI and Swagger UI paths under /notifications
springdoc.api-docs.path=/notifications/v3/api-docs
springdoc.swagger-ui.path=/notifications/swagger-ui.html
springdoc.swagger-ui.url=/notifications/v3/api-docs