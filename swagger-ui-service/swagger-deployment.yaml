apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  namespace: eventhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
      - name: swagger-ui
        image: swagger-ui:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: URLS
          value: "[{\"url\":\"/events/events/v3/api-docs\",\"name\":\"Events Service\"},{\"url\":\"/notifications/notifications/v3/api-docs\",\"name\":\"Notifications Service\"},{\"url\":\"/users/users/v3/api-docs\",\"name\":\"Users Service\"},{\"url\":\"/ticketing/ticketing/v3/api-docs\",\"name\":\"Ticketing Service\"},{\"url\":\"/payments/payments/v3/api-docs\",\"name\":\"Payments Service\"}]"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: swagger-initializer-config
  namespace: eventhub
data:
  swagger-initializer.js: |
    window.onload = function() {
        
          //<editor-fold desc="Changeable Configuration Block">
          window.ui = SwaggerUIBundle({
            urls: [
              {"url":"/events/events/v3/api-docs","name":"Events Service"},
              {"url":"/notifications/notifications/v3/api-docs","name":"Notifications Service"},
              {"url":"/users/users/v3/api-docs","name":"Users Service"},
              {"url":"/ticketing/ticketing/v3/api-docs","name":"Ticketing Service"},
              {"url":"/payments/payments/v3/api-docs","name":"Payments Service"}
            ],
            "dom_id": "#swagger-ui",
            deepLinking: true,
            presets: [
              SwaggerUIBundle.presets.apis,
              SwaggerUIStandalonePreset
            ],
            plugins: [
              SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "StandaloneLayout",
            queryConfigEnabled: false,
            requestInterceptor: function(request) {
              if (request.url.startsWith('http://localhost/events')) {
                request.url = request.url.replace('http://localhost', 'http://localhost:8080');
              } else if (request.url.startsWith('http://localhost/notifications')) {
                request.url = request.url.replace('http://localhost', 'http://localhost:8080');
              } else if (request.url.startsWith('http://localhost/users')) {
                request.url = request.url.replace('http://localhost', 'http://localhost:8080');
              } else if (request.url.startsWith('http://localhost/ticketing')) {
                request.url = request.url.replace('http://localhost', 'http://localhost:8080');
              } else if (request.url.startsWith('http://localhost/payments')) {
                request.url = request.url.replace('http://localhost', 'http://localhost:8080');
              }
              return request;
            }
          })
          
          //</editor-fold>
    
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: swagger-ui-config
  namespace: eventhub
data:
  config.json: |
    {
      "urls": [
        {
          "url": "/events/events/v3/api-docs",
          "name": "Events Service"
        },
        {
          "url": "/notifications/notifications/v3/api-docs",
          "name": "Notifications Service"
        },
        {
          "url": "/users/users/v3/api-docs",
          "name": "Users Service"
        },
        {
          "url": "/ticketing/ticketing/v3/api-docs",
          "name": "Ticketing Service"
        },
        {
          "url": "/payments/payments/v3/api-docs",
          "name": "Payments Service"
        }
      ]
    }

---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
  namespace: eventhub
spec:
  selector:
    app: swagger-ui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
