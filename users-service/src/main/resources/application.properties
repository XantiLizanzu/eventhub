spring.application.name=users-service
server.port=${USERS_SERVICE_PORT:8085}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:userdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# Set the context path for the entire app
server.servlet.context-path=/users

# Explicitly set the OpenAPI and Swagger UI paths under /users
springdoc.api-docs.path=/users/v3/api-docs
springdoc.swagger-ui.path=/users/swagger-ui.html
springdoc.swagger-ui.url=/users/v3/api-docs
