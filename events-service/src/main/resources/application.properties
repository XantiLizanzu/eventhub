spring.application.name=events-service
server.port=${EVENTS_SERVICE_PORT:8080}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:eventdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# SpringDoc Configuration
springdoc.use-management-port=false

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Ticketing Service Configuration
ticketing.service.url=http://${TICKETING_SERVICE_HOST:ticketing-service}:${TICKETING_SERVICE_PORT:8083}/

# Set the context path for the entire app
server.servlet.context-path=/events

# Explicitly set the OpenAPI and Swagger UI paths under /events
springdoc.api-docs.path=/events/v3/api-docs
springdoc.swagger-ui.path=/events/swagger-ui.html
springdoc.swagger-ui.url=/events/v3/api-docs
springdoc.swagger-ui.config-url=/events/v3/api-docs