apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  labels:
    app: notifications-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
    spec:
      containers:
      - name: notifications-service
        image: notifications-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: NOTIFICATIONS_SERVICE_PORT
          value: "8082"
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          value: "guest"
        - name: RABBITMQ_PASS
          value: "guest"
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-service
  labels:
    app: notifications-service
spec:
  selector:
    app: notifications-service
  ports:
  - name: http
    port: 8082
    targetPort: 8082