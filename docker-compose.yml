services:
  events-service:
    build: ./events-service
    ports:
      - "${EVENTS_SERVICE_PORT}:${EVENTS_SERVICE_PORT}"
    volumes:
      - ./events-service/target:/events-service/target
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true

  notifications-service:
    build: ./notifications-service
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT}:${NOTIFICATIONS_SERVICE_PORT}"
    volumes:
      - ./notifications-service/target:/notifications-service/target
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true

  ticketing-service:
    build: ./ticketing-service
    ports:
      - "${TICKETING_SERVICE_PORT}:${TICKETING_SERVICE_PORT}"
    volumes:
      - ./ticketing-service/target:/ticketing-service/target
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true

  payments-service:
    build: ./payments-service
    ports:
      - "${PAYMENTS_SERVICE_PORT}:${PAYMENTS_SERVICE_PORT}"
    volumes:
      - ./payments-service/target:/payments-service/target
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true

  users-service:
    build: ./users-service
    ports:
      - "${USERS_SERVICE_PORT}:${USERS_SERVICE_PORT}"
    volumes:
      - ./users-service/target:/users-service/target
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"